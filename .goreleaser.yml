dockers:
  - id: linux-amd64
    ids:
      - thinkt-linux-amd64
    dockerfile: etc/Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/wethinkt/thinkt:{{ .Version }}-amd64"
      - "ghcr.io/wethinkt/thinkt:latest-amd64"
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=thinkt"
      - "--label=org.opencontainers.image.description=Tools for exploring LLM conversation traces"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"
    use: buildx

  - id: linux-arm64
    ids:
      - thinkt-linux-arm64
    dockerfile: etc/Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/wethinkt/thinkt:{{ .Version }}-arm64"
      - "ghcr.io/wethinkt/thinkt:latest-arm64"
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=thinkt"
      - "--label=org.opencontainers.image.description=Tools for exploring LLM conversation traces"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"
    use: buildx
    goarch: arm64

  - id: relay-linux-amd64
    ids:
      - relay-linux-amd64
    dockerfile: etc/Dockerfile.goreleaser-relay
    image_templates:
      - "ghcr.io/wethinkt/thinkt-relay:{{ .Version }}-amd64"
      - "ghcr.io/wethinkt/thinkt-relay:latest-amd64"
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=thinkt-relay"
      - "--label=org.opencontainers.image.description=Relays LLM conversation traces"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"
    use: buildx

  - id: relay-linux-arm64
    ids:
      - relay-linux-arm64
    dockerfile: etc/Dockerfile.goreleaser-relay
    image_templates:
      - "ghcr.io/wethinkt/thinkt-relay:{{ .Version }}-arm64"
      - "ghcr.io/wethinkt/thinkt-relay:latest-arm64"
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=thinkt-relay"
      - "--label=org.opencontainers.image.description=Relays LLM conversation traces"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"
    use: buildx
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/wethinkt/thinkt:{{ .Version }}"
    image_templates:
      - "ghcr.io/wethinkt/thinkt:{{ .Version }}-amd64"
      - "ghcr.io/wethinkt/thinkt:{{ .Version }}-arm64"

  - name_template: "ghcr.io/wethinkt/thinkt:latest"
    image_templates:
      - "ghcr.io/wethinkt/thinkt:latest-amd64"
      - "ghcr.io/wethinkt/thinkt:latest-arm64"

  - name_template: "ghcr.io/wethinkt/thinkt-relay:{{ .Version }}"
    image_templates:
      - "ghcr.io/wethinkt/thinkt-relay:{{ .Version }}-amd64"
      - "ghcr.io/wethinkt/thinkt-relay:{{ .Version }}-arm64"

  - name_template: "ghcr.io/wethinkt/thinkt-relay:latest"
    image_templates:
      - "ghcr.io/wethinkt/thinkt-relay:latest-amd64"
      - "ghcr.io/wethinkt/thinkt-relay:latest-arm64"
