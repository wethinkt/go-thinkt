# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# .goreleaser.yml
# Consolidated build for all binaries via goreleaser-cross (CGO enabled)
# Windows builds are handled by .goreleaser-windows.yml

version: 2

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

before:
  hooks:
    - go mod tidy
    - rm -rf completions
    - mkdir completions
    - rm -rf manpages
    - mkdir manpages
    - sh -c 'go run ./cmd/thinkt completion bash > ./completions/thinkt.bash'
    - sh -c 'go run ./cmd/thinkt completion fish > ./completions/thinkt.fish'
    - sh -c 'go run ./cmd/thinkt completion zsh > ./completions/thinkt.zsh'
    - sh -c 'go run ./cmd/thinkt docs man -o ./manpages/'

builds:
  # ── thinkt ─────────────────────────────────────────────────────────────
  - id: thinkt-linux-amd64
    main: ./cmd/thinkt
    binary: thinkt
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
      - CC=x86_64-linux-gnu-gcc
      - CXX=x86_64-linux-gnu-g++
    ldflags:
      - -s -w -X github.com/wethinkt/go-thinkt/internal/version.Version={{.Version}}

  - id: thinkt-linux-arm64
    main: ./cmd/thinkt
    binary: thinkt
    goos: [linux]
    goarch: [arm64]
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    ldflags:
      - -s -w -X github.com/wethinkt/go-thinkt/internal/version.Version={{.Version}}

  - id: thinkt-darwin-amd64
    main: ./cmd/thinkt
    binary: thinkt
    goos: [darwin]
    goarch: [amd64]
    env:
      - MACOSX_DEPLOYMENT_TARGET=11.0
      - CGO_ENABLED=1
      - CC=o64-clang
      - CXX=o64-clang++
    ldflags:
      - -s -w -X github.com/wethinkt/go-thinkt/internal/version.Version={{.Version}}

  - id: thinkt-darwin-arm64
    main: ./cmd/thinkt
    binary: thinkt
    goos: [darwin]
    goarch: [arm64]
    env:
      - MACOSX_DEPLOYMENT_TARGET=11.0
      - CGO_ENABLED=1
      - CC=oa64-clang
      - CXX=oa64-clang++
    ldflags:
      - -s -w -X github.com/wethinkt/go-thinkt/internal/version.Version={{.Version}}

  # ── thinkt-relay ──────────────────────────────────────────────────────────
  - id: relay-linux-amd64
    main: ./cmd/thinkt-relay
    binary: thinkt-relay
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
      - CC=x86_64-linux-gnu-gcc
      - CXX=x86_64-linux-gnu-g++
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: relay-linux-arm64
    main: ./cmd/thinkt-relay
    binary: thinkt-relay
    goos: [linux]
    goarch: [arm64]
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: relay-darwin-amd64
    main: ./cmd/thinkt-relay
    binary: thinkt-relay
    goos: [darwin]
    goarch: [amd64]
    env:
      - MACOSX_DEPLOYMENT_TARGET=11.0
      - CGO_ENABLED=1
      - CC=o64-clang
      - CXX=o64-clang++
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: relay-darwin-arm64
    main: ./cmd/thinkt-relay
    binary: thinkt-relay
    goos: [darwin]
    goarch: [arm64]
    env:
      - MACOSX_DEPLOYMENT_TARGET=11.0
      - CGO_ENABLED=1
      - CC=oa64-clang
      - CXX=oa64-clang++
    ldflags:
      - -s -w -X main.version={{.Version}}

  # ── thinkt-collector ───────────────────────────────────────────────────
  - id: collector-linux-amd64
    main: ./cmd/thinkt-collector
    binary: thinkt-collector
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
      - CC=x86_64-linux-gnu-gcc
      - CXX=x86_64-linux-gnu-g++
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: collector-linux-arm64
    main: ./cmd/thinkt-collector
    binary: thinkt-collector
    goos: [linux]
    goarch: [arm64]
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: collector-darwin-amd64
    main: ./cmd/thinkt-collector
    binary: thinkt-collector
    goos: [darwin]
    goarch: [amd64]
    env:
      - MACOSX_DEPLOYMENT_TARGET=11.0
      - CGO_ENABLED=1
      - CC=o64-clang
      - CXX=o64-clang++
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: collector-darwin-arm64
    main: ./cmd/thinkt-collector
    binary: thinkt-collector
    goos: [darwin]
    goarch: [arm64]
    env:
      - MACOSX_DEPLOYMENT_TARGET=11.0
      - CGO_ENABLED=1
      - CC=oa64-clang
      - CXX=oa64-clang++
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    ids:
      - thinkt-linux-amd64
      - thinkt-linux-arm64
      - thinkt-darwin-amd64
      - thinkt-darwin-arm64
      - relay-linux-amd64
      - relay-linux-arm64
      - relay-darwin-amd64
      - relay-darwin-arm64
      - collector-linux-amd64
      - collector-linux-arm64
      - collector-darwin-amd64
      - collector-darwin-arm64
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - src: ./manpages/*
        dst: man/man1/
        strip_parent: true
      - src: ./completions/*
        dst: completions/
        strip_parent: true

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - thinkt-darwin-amd64
        - thinkt-darwin-arm64
        - relay-darwin-amd64
        - relay-darwin-arm64
        - collector-darwin-amd64
        - collector-darwin-arm64
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
        entitlements: ./etc/entitlements.plist
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"
        wait: true
        timeout: 20m

homebrew_casks:
  - name: thinkt
    ids:
      - default
    url:
      verified: github.com/wethinkt/go-thinkt
    repository:
      owner: wethinkt
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/wethinkt/go-thinkt
    description: Tools for exploring LLM conversation traces
    license: MIT
    binaries:
      - thinkt
      - thinkt-relay
      - thinkt-collector
    completions:
      bash: completions/thinkt.bash
      zsh: completions/thinkt.zsh
      fish: completions/thinkt.fish
    manpages:
      - man/man1/thinkt-agents-follow.1
